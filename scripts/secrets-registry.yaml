# Secrets Registry — inventory of all secrets across services
# Raw values live in the corresponding .env files in this directory
# This file is the source of truth for WHAT exists and WHERE it goes
#
# Apply with: ./scripts/sync-secrets.sh [service]

services:

  # ── Claude Agent Runner (production) ──
  claude-runner:
    namespace: claude-runner
    k8s:
      admin-key:
        source: k8s.env
        keys:
          ADMIN_API_KEY: ADMIN_API_KEY
      claude-tokens:
        source: k8s.env
        keys:
          CLAUDE_CODE_OAUTH_TOKEN: CLAUDE_CODE_OAUTH_TOKEN
      git-tokens:
        source: k8s.env
        keys:
          GITHUB_TOKEN: GITHUB_TOKEN
      obsidian-auth:
        source: k8s.env
        keys:
          OBSIDIAN_AUTH_TOKEN: OBSIDIAN_AUTH_TOKEN
          OBSIDIAN_E2EE_PASSWORD: OBSIDIAN_E2EE_PASSWORD
      cloudflare-tunnel:
        source: k8s.env
        keys:
          token: CLOUDFLARE_TUNNEL_TOKEN

  # ── Claude Agent Runner (dev) ──
  claude-runner-dev:
    namespace: claude-runner-dev
    k8s:
      claude-tokens:
        source: k8s.env
        keys:
          CLAUDE_CODE_OAUTH_TOKEN: CLAUDE_CODE_OAUTH_TOKEN
      git-tokens:
        source: k8s.env
        keys:
          GITHUB_TOKEN: GITHUB_TOKEN

  # ── YouTube MCP ──
  cassandra-yt-mcp:
    namespace: cassandra-yt-mcp
    k8s:
      cassandra-yt-mcp-backend:
        source: yt-mcp.env
        keys:
          BACKEND_API_TOKEN: BACKEND_API_TOKEN
          HUGGINGFACE_TOKEN: HUGGINGFACE_TOKEN
      cloudflare-tunnel:
        source: yt-mcp.env
        keys:
          token: YT_MCP_CLOUDFLARE_TUNNEL_TOKEN
    wrangler:
      directory: cassandra-yt-mcp/worker
      source: yt-mcp.env
      keys:
        - WORKOS_CLIENT_ID
        - WORKOS_CLIENT_SECRET
        - COOKIE_ENCRYPTION_KEY
        - BACKEND_BASE_URL
        - BACKEND_API_TOKEN
        - CF_ACCESS_CLIENT_ID
        - CF_ACCESS_CLIENT_SECRET

  # ── Portal Worker ──
  cassandra-portal:
    wrangler:
      directory: cassandra-portal
      source: portal.env
      keys:
        - RUNNER_URL
        - RUNNER_ADMIN_KEY
        - DOMAIN
        - VM_PUSH_URL
        - VM_PUSH_CLIENT_ID
        - VM_PUSH_CLIENT_SECRET
    github-actions:
      source: github-actions.env
      note: "Set on DigiBugCat/cassandra-portal repo → Settings → Secrets"
      keys:
        CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN
        CLOUDFLARE_ACCOUNT_ID: CLOUDFLARE_ACCOUNT_ID
        MCP_KEYS_KV_ID: PORTAL_MCP_KEYS_KV_ID
        WORKER_ROUTE_PATTERN: PORTAL_WORKER_ROUTE_PATTERN
        WORKER_ROUTE_ZONE: PORTAL_WORKER_ROUTE_ZONE

  # ── YouTube MCP (GitHub Actions) ──
  cassandra-yt-mcp-actions:
    github-actions:
      source: github-actions.env
      note: "Set on DigiBugCat/cassandra-yt-mcp repo → Settings → Secrets"
      keys:
        CLOUDFLARE_API_TOKEN: CLOUDFLARE_API_TOKEN
        CLOUDFLARE_ACCOUNT_ID: CLOUDFLARE_ACCOUNT_ID
        OAUTH_KV_ID: YT_MCP_OAUTH_KV_ID
        MCP_KEYS_KV_ID: YT_MCP_MCP_KEYS_KV_ID
        WORKER_ROUTE_PATTERN: YT_MCP_WORKER_ROUTE_PATTERN
        WORKER_ROUTE_ZONE: YT_MCP_WORKER_ROUTE_ZONE

  # ── Terraform (all environments) ──
  terraform:
    source: infra.env
    note: "Applied via 'source env/infra.env' before tofu plan/apply"
    keys:
      - TF_VAR_cloudflare_api_key
      - TF_VAR_cloudflare_email
      - TF_VAR_cloudflare_account_id
      - TF_VAR_zone_id
      - TF_VAR_tunnel_secret
      - TF_VAR_runner_admin_key
      - TF_VAR_internal_access_client_id
      - TF_VAR_internal_access_client_secret
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
